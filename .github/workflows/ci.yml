name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build · fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace

      - name: test
        run: cargo test --workspace

      - name: holt backend (ART, pure Rust) — clippy · test · CLI
        run: |
          cargo clippy -p quillcache-core --features holt --all-targets -- -D warnings
          cargo test -p quillcache-core --features holt
          cargo build -p quillcache --features holt

  rocksdb:
    name: rocksdb backend (LSM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang/libclang (librocksdb-sys bindgen)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: clippy
        run: cargo clippy -p quillcache-core --features rocksdb --all-targets -- -D warnings

      - name: test
        run: cargo test -p quillcache-core --features rocksdb

      - name: build CLI with rocksdb feature
        run: cargo build -p quillcache --features rocksdb

  etcd:
    name: etcd metadata backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf-compiler (etcd-client build.rs / prost)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # Compile + lint the etcd backend (the integration test is #[ignore]: it
      # needs a running etcd, so CI does not run it).
      - name: clippy + compile-check
        run: cargo clippy -p quillcache-transfer-engine --features etcd --all-targets -- -D warnings
